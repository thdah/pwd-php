<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>
<body>
    
    <div class="navbar navbar-dark bg-dark">
        <div class="container" style="max-height: 600px;">
            <a href="#" class="navbar-brand">
                Todo <span class="badge bg-danger rounded-pill ms-2">0</span>
            </a>
        </div>
    </div>
    <div class="container" style="max-height: 600px; width: 50%;">
        <div class="input-group my-4">
             <input type="text" class="form-control">
            <button class="btn btn-dark">Add</button>
        </div>
        <ul id="todo" class="list-group"></ul>
        <ul id="done" class="list-group mt-4 opacity-50"></ul>
    </div>
    
    <script>
        document.querySelector("button").onclick = () => {
            let text = document.querySelector("input").value;
            if(text == "") return false;
            createItem(text);
            updateCount();

            document.querySelector("input").value = "";
            document.querySelector("input").focus();
        }

        document.querySelector("input").onkeydown = e => {
            if(e.key == "Enter") {
                document.querySelector("button").onclick();
            }
        }

        function updateCount() {
            document.querySelector(".badge").textContent =
            document.querySelectorAll("#todo li").length;
        }

        function createItem(text) {
            let li = document.createElement("li");
            li.classList.add("list-group-item");
            li.textContent = text;

            let check = document.createElement("a");
            check.setAttribute("href", "#");
            check.classList.add("fa-solid", "fa-check", "float-start", "me-2");
            check.onclick = () => {
                document.querySelector("#done").appendChild(li);
                li.style.textDecoration = "line-through";
                check.remove();
                updateCount();
            }
            li.appendChild(check);

            let del = document.createElement("a");
            del.setAttribute("href", "#");
            del.classList.add("fa-solid", "fa-trash", "float-end", "text-danger");
            del.onclick = () => {
                li.remove();
            }
            li.appendChild(del);

            document.querySelector("#todo").appendChild(li);
        }
    </script>
</body>
</html>
